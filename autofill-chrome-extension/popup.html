<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1d1d1f;
      background: #fff;
    }
    header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid #e5e5e5;
      font-weight: 600;
      font-size: 14px;
      color: #111;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }
    .label { color: #333; }
    .sublabel { font-size: 11px; color: #888; margin-top: 2px; }
    /* Toggle switch */
    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 22px;
      cursor: pointer; transition: background .2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform .2s;
    }
    input:checked + .slider { background: #0a66c2; }
    input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <header>Job Autofill</header>
  <div class="row">
    <div>
      <div class="label">Auto-Apply Redirect</div>
      <div class="sublabel">LinkedIn: auto-click Apply button</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="auto-redirect">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
